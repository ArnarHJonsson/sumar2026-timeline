<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sumar 2026 – Smásölusvið Olís</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1e28;
    --border: #252a36;
    --text: #e8eaf0;
    --text-dim: #7a8299;
    --accent: #4f8cff;
    --accent-glow: rgba(79, 140, 255, 0.15);
    --green: #34d399;
    --green-dim: rgba(52, 211, 153, 0.15);
    --amber: #fbbf24;
    --amber-dim: rgba(251, 191, 36, 0.15);
    --red: #f87171;
    --red-dim: rgba(248, 113, 113, 0.15);
    --purple: #a78bfa;
    --purple-dim: rgba(167, 139, 250, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  header {
    padding: 32px 48px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 48px;
    width: 120px;
    height: 2px;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-mark {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 16px;
    color: #fff;
    box-shadow: 0 4px 20px rgba(79, 140, 255, 0.3);
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  h1 span {
    color: var(--text-dim);
    font-weight: 300;
    font-size: 18px;
    margin-left: 12px;
  }

  .clock-area {
    text-align: right;
  }

  .clock {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .date-text {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    padding: 20px 48px;
    border-bottom: 1px solid var(--border);
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    flex: 1;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: all 0.3s;
  }

  .stat-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .stat-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .stat-icon.total { background: var(--accent-glow); color: var(--accent); }
  .stat-icon.progress { background: var(--green-dim); color: var(--green); }
  .stat-icon.waiting { background: var(--amber-dim); color: var(--amber); }
  .stat-icon.overdue { background: var(--red-dim); color: var(--red); }

  .stat-info .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 26px;
    font-weight: 700;
  }

  .stat-info .stat-label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .timeline-container {
    padding: 24px 48px;
    overflow-x: auto;
  }

  .timeline-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .timeline-title {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
  }

  .legend {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }

  .gantt {
    position: relative;
    min-width: 100%;
  }

  .gantt-months {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-left: 280px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .gantt-month {
    flex: 1;
    min-width: 0;
    text-align: center;
    padding: 8px 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    border-right: 1px solid var(--border);
    position: relative;
  }

  .gantt-month.current {
    color: var(--accent);
    font-weight: 700;
  }

  .gantt-weeks {
    display: flex;
    margin-left: 280px;
    border-bottom: 1px solid var(--border);
  }

  .gantt-week {
    flex: 1;
    min-width: 0;
    text-align: center;
    padding: 4px 0;
    font-size: 10px;
    color: var(--text-dim);
    border-right: 1px solid rgba(37, 42, 54, 0.5);
    font-family: 'Space Mono', monospace;
  }

  .gantt-row {
    display: flex;
    align-items: center;
    height: 44px;
    border-bottom: 1px solid rgba(37, 42, 54, 0.5);
    transition: background 0.2s;
  }

  .gantt-row:hover {
    background: var(--surface);
  }

  .task-label {
    width: 280px;
    min-width: 280px;
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 500;
    overflow: hidden;
  }

  .task-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .task-status-dot.in-progress { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .task-status-dot.not-started { background: var(--amber); }
  .task-status-dot.overdue { background: var(--red); box-shadow: 0 0 6px var(--red); animation: pulse 2s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .task-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .task-bucket-tag {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    font-weight: 700;
  }

  .tag-verkefnalisti { background: var(--purple-dim); color: var(--purple); }
  .tag-igangi { background: var(--accent-glow); color: var(--accent); }

  .task-timeline {
    flex: 1;
    position: relative;
    height: 100%;
    display: flex;
    align-items: center;
  }

  .task-bar {
    position: absolute;
    height: 22px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 8px;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    color: rgba(255,255,255,0.8);
    transition: all 0.3s;
    cursor: pointer;
    overflow: hidden;
  }

  .task-bar:hover {
    height: 28px;
    filter: brightness(1.2);
    z-index: 5;
  }

  .task-bar.in-progress {
    background: linear-gradient(90deg, #059669, var(--green));
    box-shadow: 0 2px 12px rgba(52, 211, 153, 0.3);
  }

  .task-bar.not-started {
    background: linear-gradient(90deg, #b45309, var(--amber));
    box-shadow: 0 2px 12px rgba(251, 191, 36, 0.2);
  }

  .task-bar.overdue {
    background: linear-gradient(90deg, #dc2626, var(--red));
    box-shadow: 0 2px 12px rgba(248, 113, 113, 0.3);
  }

  .task-bar.no-dates {
    background: var(--surface2);
    border: 1px dashed var(--border);
    color: var(--text-dim);
    justify-content: center;
  }

  .today-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--red);
    z-index: 8;
    box-shadow: 0 0 8px rgba(248, 113, 113, 0.5);
  }

  .today-line::before {
    content: 'Í DAG';
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    color: var(--red);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .refresh-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }

  .refresh-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 3s infinite;
  }

  .section-divider {
    height: 32px;
    display: flex;
    align-items: center;
    padding-left: 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-weight: 700;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .gantt-row {
    animation: slideIn 0.4s ease-out both;
  }
</style>
</head>
<body>

<div class="noise"></div>

<header>
  <div class="logo-area">
    <div class="logo-mark">SO</div>
    <div>
      <h1>Sumar 2026 <span>Smásölusvið Olís</span></h1>
    </div>
  </div>
  <div class="clock-area">
    <div class="clock" id="clock">--:--</div>
    <div class="date-text" id="dateText"></div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-icon total">📋</div>
    <div class="stat-info">
      <div class="stat-num" id="totalTasks">0</div>
      <div class="stat-label">Verkefni samtals</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon progress">⚡</div>
    <div class="stat-info">
      <div class="stat-num" id="inProgress">0</div>
      <div class="stat-label">Í gangi</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon waiting">⏳</div>
    <div class="stat-info">
      <div class="stat-num" id="notStarted">0</div>
      <div class="stat-label">Ekki byrjað</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon overdue">🔴</div>
    <div class="stat-info">
      <div class="stat-num" id="overdue">0</div>
      <div class="stat-label">Framyfir frest</div>
    </div>
  </div>
</div>

<div class="timeline-container">
  <div class="timeline-header">
    <div class="timeline-title">Gantt tímalína</div>
    <div style="display:flex;gap:24px;align-items:center">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Í gangi</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div> Ekki byrjað</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Framyfir frest</div>
      </div>
      <div class="refresh-badge"><div class="refresh-dot"></div> Síðast uppfært: <span id="lastUpdate">--:--</span></div>
    </div>
  </div>

  <div class="gantt" id="ganttChart"></div>
</div>

<script>
const TASKS = [
  // Í gangi — In progress
  { name: "Vildarkerfi Lobyco", start: "2026-04-28", due: "2026-06-09", bucket: "Í gangi", progress: "in-progress" },
  { name: "Mínar Síður Beta", start: "2026-03-11", due: "2026-06-17", bucket: "Í gangi", progress: "in-progress" },
  { name: "App víkur", start: null, due: "2026-05-27", bucket: "Í gangi", progress: "in-progress" },
  { name: "Olís með dýfu", start: "2026-04-28", due: "2026-05-20", bucket: "Í gangi", progress: "in-progress" },
  { name: "Samfélagsskýrsla", start: "2026-04-13", due: "2026-05-08", bucket: "Í gangi", progress: "in-progress" },
  { name: "Nýr matseðill", start: "2026-03-02", due: "2026-05-27", bucket: "Í gangi", progress: "in-progress" },
  { name: "Sumarleikur", start: "2026-05-13", due: "2026-06-01", bucket: "Í gangi", progress: "not-started" },
  { name: "Barnabox", start: "2026-04-22", due: "2026-05-20", bucket: "Í gangi", progress: "not-started" },
  { name: "Latibær miðnæturopnun", start: "2026-04-28", due: "2026-05-06", bucket: "Í gangi", progress: "not-started" },
  { name: "Fatahreinsunarskápar", start: "2026-04-22", due: "2026-08-26", bucket: "Í gangi", progress: "not-started" },
  { name: "Glans 1 árs.", start: "2026-04-15", due: "2026-05-15", bucket: "Í gangi", progress: "not-started" },
  { name: "Bolir f starfsmenn", start: "2026-04-28", due: "2026-05-22", bucket: "Í gangi", progress: "not-started" },
  { name: "Ís og flörrí", start: "2026-04-22", due: "2026-06-18", bucket: "Í gangi", progress: "not-started" },
  { name: "Fyrirtækjasvið", start: null, due: null, bucket: "Í gangi", progress: "not-started" },

  // Verkefnalisti — Not started
  { name: "ID skilti Skúlagata og Sæbraut", start: "2026-06-02", due: "2026-06-17", bucket: "Verkefnalisti", progress: "not-started" },
  { name: "Gassjálfsalar", start: "2026-05-13", due: null, bucket: "Verkefnalisti", progress: "not-started" },
  { name: "Fá myndir frá stöðvastjórum", start: "2026-05-05", due: "2026-05-08", bucket: "Verkefnalisti", progress: "not-started" },
  { name: "TIKTOK umgjörð", start: null, due: null, bucket: "Verkefnalisti", progress: "not-started" },
  { name: "PR", start: null, due: null, bucket: "Verkefnalisti", progress: "not-started" },
  { name: "ÓB location targeting", start: null, due: null, bucket: "Verkefnalisti", progress: "not-started" },
];

// Remove duplicate Latibær
const seen = new Set();
const tasks = TASKS.filter(t => {
  const key = t.name + t.bucket;
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
});

// Timeline range: March 2026 – September 2026
const TIMELINE_START = new Date(2026, 2, 1); // March 1
const TIMELINE_END = new Date(2026, 8, 30);  // Sept 30
const TOTAL_DAYS = (TIMELINE_END - TIMELINE_START) / (1000 * 60 * 60 * 24);
const TODAY = new Date();

const MONTHS = [
  { name: "Mars", start: new Date(2026, 2, 1), end: new Date(2026, 2, 31) },
  { name: "Apríl", start: new Date(2026, 3, 1), end: new Date(2026, 3, 30) },
  { name: "Maí", start: new Date(2026, 4, 1), end: new Date(2026, 4, 31) },
  { name: "Júní", start: new Date(2026, 5, 1), end: new Date(2026, 5, 30) },
  { name: "Júlí", start: new Date(2026, 6, 1), end: new Date(2026, 6, 31) },
  { name: "Ágúst", start: new Date(2026, 7, 1), end: new Date(2026, 7, 31) },
  { name: "September", start: new Date(2026, 8, 1), end: new Date(2026, 8, 30) },
];

function dayOffset(date) {
  return (date - TIMELINE_START) / (1000 * 60 * 60 * 24);
}

function pct(days) {
  return (days / TOTAL_DAYS) * 100;
}

function getTaskStatus(task) {
  if (!task.due) return task.progress;
  const due = new Date(task.due);
  if (due < TODAY && task.progress !== 'completed') return 'overdue';
  return task.progress;
}

function buildGantt() {
  const container = document.getElementById('ganttChart');
  container.innerHTML = '';

  // Month headers
  const monthRow = document.createElement('div');
  monthRow.className = 'gantt-months';
  MONTHS.forEach(m => {
    const div = document.createElement('div');
    div.className = 'gantt-month';
    const now = new Date();
    if (now.getMonth() === m.start.getMonth() && now.getFullYear() === m.start.getFullYear()) {
      div.classList.add('current');
    }
    div.textContent = m.name;
    const monthDays = (m.end - m.start) / (1000 * 60 * 60 * 24) + 1;
    div.style.flex = `${monthDays} 0 0`;
    monthRow.appendChild(div);
  });
  container.appendChild(monthRow);

  // Group tasks
  const iGangi = tasks.filter(t => t.bucket === 'Í gangi');
  const verkefnalisti = tasks.filter(t => t.bucket === 'Verkefnalisti');

  function addSection(label) {
    const div = document.createElement('div');
    div.className = 'section-divider';
    div.textContent = label;
    container.appendChild(div);
  }

  function addTaskRows(taskList) {
    taskList.forEach((task, i) => {
      const row = document.createElement('div');
      row.className = 'gantt-row';
      row.style.animationDelay = `${i * 0.05}s`;

      const status = getTaskStatus(task);

      // Label
      const label = document.createElement('div');
      label.className = 'task-label';
      const dot = document.createElement('div');
      dot.className = `task-status-dot ${status}`;
      const name = document.createElement('div');
      name.className = 'task-name';
      name.textContent = task.name;
      const tag = document.createElement('div');
      tag.className = `task-bucket-tag ${task.bucket === 'Í gangi' ? 'tag-igangi' : 'tag-verkefnalisti'}`;
      tag.textContent = task.bucket === 'Í gangi' ? 'Í gangi' : 'Listi';
      label.appendChild(dot);
      label.appendChild(name);
      label.appendChild(tag);
      row.appendChild(label);

      // Timeline area
      const timeline = document.createElement('div');
      timeline.className = 'task-timeline';

      if (task.start || task.due) {
        const bar = document.createElement('div');
        bar.className = `task-bar ${status}`;

        let startDate = task.start ? new Date(task.start) : (task.due ? new Date(new Date(task.due).getTime() - 14 * 24 * 60 * 60 * 1000) : TIMELINE_START);
        let endDate = task.due ? new Date(task.due) : new Date(startDate.getTime() + 21 * 24 * 60 * 60 * 1000);

        if (startDate < TIMELINE_START) startDate = TIMELINE_START;
        if (endDate > TIMELINE_END) endDate = TIMELINE_END;

        const leftPct = pct(dayOffset(startDate));
        const widthPct = pct(dayOffset(endDate) - dayOffset(startDate));

        bar.style.left = `${leftPct}%`;
        bar.style.width = `${Math.max(widthPct, 1.5)}%`;

        if (task.due) {
          const d = new Date(task.due);
          bar.textContent = `${d.getDate()}/${d.getMonth() + 1}`;
        }

        timeline.appendChild(bar);
      } else {
        const bar = document.createElement('div');
        bar.className = 'task-bar no-dates';
        bar.style.left = '5%';
        bar.style.width = '12%';
        bar.textContent = 'Engin dagsetning';
        timeline.appendChild(bar);
      }

      row.appendChild(timeline);
      container.appendChild(row);
    });
  }

  addSection('⚡  Í gangi');
  addTaskRows(iGangi);
  addSection('📋  Verkefnalisti');
  addTaskRows(verkefnalisti);

  // Today line
  if (TODAY >= TIMELINE_START && TODAY <= TIMELINE_END) {
    const todayPct = pct(dayOffset(TODAY));
    // Add today line to each task-timeline
    document.querySelectorAll('.task-timeline').forEach(tl => {
      const line = document.createElement('div');
      line.className = 'today-line';
      line.style.left = `${todayPct}%`;
      tl.appendChild(line);
    });
    // Add to month row area too
    const headerLine = document.createElement('div');
    headerLine.className = 'today-line';
    headerLine.style.left = `calc(280px + ${todayPct}% * (100% - 280px) / 100%)`;
  }

  // Stats
  const total = tasks.length;
  const inProg = tasks.filter(t => t.progress === 'in-progress').length;
  const notStarted = tasks.filter(t => t.progress === 'not-started').length;
  const overdueCount = tasks.filter(t => getTaskStatus(t) === 'overdue').length;

  document.getElementById('totalTasks').textContent = total;
  document.getElementById('inProgress').textContent = inProg;
  document.getElementById('notStarted').textContent = notStarted;
  document.getElementById('overdue').textContent = overdueCount;
}

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;

  const days = ['sunnudagur', 'mánudagur', 'þriðjudagur', 'miðvikudagur', 'fimmtudagur', 'föstudagur', 'laugardagur'];
  const months = ['janúar', 'febrúar', 'mars', 'apríl', 'maí', 'júní', 'júlí', 'ágúst', 'september', 'október', 'nóvember', 'desember'];
  document.getElementById('dateText').textContent = `${days[now.getDay()]}, ${now.getDate()}. ${months[now.getMonth()]} ${now.getFullYear()}`;

  document.getElementById('lastUpdate').textContent = `${h}:${m}`;
}

// Init
buildGantt();
updateClock();
setInterval(updateClock, 1000);
</script>
