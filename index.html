<style>:root{--bg:#0a0c10;--surface:#12151c;--surface2:#1a1e28;--border:#252a36;--text:#e8eaf0;--text-dim:#7a8299;--accent:#4f8cff;--accent-glow:rgba(79,140,255,.15);--green:#34d399;--green-dim:rgba(52,211,153,.15);--amber:#fbbf24;--amber-dim:rgba(251,191,36,.15);--red:#f87171;--red-dim:rgba(248,113,113,.15);--purple:#a78bfa;--purple-dim:rgba(167,139,250,.15)}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;min-height:100vh}.noise{position:fixed;inset:0;opacity:.03;pointer-events:none;z-index:999}header{padding:32px 48px 24px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--border);position:relative}header::after{content:'';position:absolute;bottom:-1px;left:48px;width:120px;height:2px;background:var(--accent);box-shadow:0 0 12px var(--accent)}.logo-area{display:flex;align-items:center;gap:16px}.logo-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#7c3aed);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:16px;color:#fff;box-shadow:0 4px 20px rgba(79,140,255,.3)}h1{font-size:28px;font-weight:700;letter-spacing:-.5px}h1 span{color:var(--text-dim);font-weight:300;font-size:18px;margin-left:12px}.clock-area{text-align:right}.clock{font-family:'Space Mono',monospace;font-size:32px;font-weight:700;color:var(--accent);letter-spacing:2px}.date-text{font-size:13px;color:var(--text-dim);margin-top:2px}.stats-bar{display:flex;gap:24px;padding:20px 48px;border-bottom:1px solid var(--border)}.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 24px;flex:1;display:flex;align-items:center;gap:16px;transition:all .3s}.stat-card:hover{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}.stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-co
